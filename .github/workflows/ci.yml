name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4

      - name: Checkout stubborn (editable install)
        uses: actions/checkout@v4
        with:
          repository: stubborn-ai/stubborn
          path: stubborn

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install
        run: |
          pip install -e "./stubborn"
          pip install -e ".[dev]"

      - name: Ruff
        run: ruff check src tests

      - name: Pytest
        run: pytest -q
