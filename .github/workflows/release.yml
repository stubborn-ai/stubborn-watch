name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  pypi:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Require PyPI API token
        run: |
          if [ -z "${{ secrets.PYPI_API_TOKEN }}" ]; then
            echo "::error::Add repository secret PYPI_API_TOKEN (PyPI -> Account settings -> API tokens)."
            exit 1
          fi

      - name: Build package
        run: pip install build twine && python -m build

      - name: Upload to PyPI
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}
        run: python -m twine upload dist/* --skip-existing

  github-release:
    name: GitHub Release
    runs-on: ubuntu-latest
    needs: pypi
    if: ${{ always() && needs.pypi.result != 'cancelled' }}
    steps:
      - uses: actions/checkout@v4

      - uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
