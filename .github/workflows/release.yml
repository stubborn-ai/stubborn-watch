name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  verify:
    name: Verify (ruff + pytest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Checkout stubborn (editable install)
        uses: actions/checkout@v4
        with:
          repository: stubborn-ai/stubborn
          path: stubborn

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dev dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e "./stubborn"
          pip install -e ".[dev]"

      - name: Ruff check
        run: ruff check src tests

      - name: Run tests
        run: pytest -q

  pypi:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    needs: verify
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Require PyPI API token
        run: |
          if [ -z "${{ secrets.PYPI_API_TOKEN }}" ]; then
            echo "::error::Add repository secret PYPI_API_TOKEN (PyPI -> Account settings -> API tokens)."
            exit 1
          fi

      - name: Build package
        run: pip install build twine && python -m build

      - name: Upload to PyPI
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}
        run: python -m twine upload dist/* --skip-existing

  github-release:
    name: GitHub Release
    runs-on: ubuntu-latest
    needs: pypi
    if: ${{ needs.pypi.result == 'success' }}
    steps:
      - uses: actions/checkout@v4

      - uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
